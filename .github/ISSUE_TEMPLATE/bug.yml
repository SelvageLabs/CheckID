name: Bug Report
description: Report a problem with the CheckID module
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Import-Module CheckID
        2. Run Get-CheckById 'ENTRA-ADMIN-001'
        3. See error …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: Module Version
      description: "Output of: (Get-Module CheckID).Version"
      placeholder: "1.2.0"
    validations:
      required: true

  - type: input
    id: ps-version
    attributes:
      label: PowerShell Version
      description: "Output of: $PSVersionTable.PSVersion"
      placeholder: "7.4.6"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 15"
    validations:
      required: false
