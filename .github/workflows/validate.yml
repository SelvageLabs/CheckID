name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

jobs:
  lint:
    name: Lint PowerShell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse-check all scripts
        shell: pwsh
        run: |
          $allClean = $true
          Get-ChildItem scripts/*.ps1 | ForEach-Object {
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$null, [ref]$parseErrors
            )
            if ($parseErrors) {
              $allClean = $false
              Write-Host "::error file=$($_.Name)::$($parseErrors.Count) parse error(s)"
              $parseErrors | ForEach-Object { Write-Host "  $_" }
            } else {
              Write-Host "  OK: $($_.Name)"
            }
          }
          if (-not $allClean) { exit 1 }
          Write-Host "`nAll scripts parse clean"

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -RequiredVersion 1.24.0 -Force -Scope CurrentUser
          $results = Get-ChildItem scripts/*.ps1 |
            ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName }
          if ($results) {
            Write-Host "::warning::$($results.Count) PSScriptAnalyzer finding(s)"
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
          } else {
            Write-Host "No PSScriptAnalyzer findings"
          }
          # Warn only — do not fail on style issues

  validate-data:
    name: Validate Data Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CSV files
        shell: pwsh
        run: |
          # --- framework-mappings.csv ---
          $fm = Import-Csv data/framework-mappings.csv
          $expectedCols = @(
            'CisControl','CisTitle','CisE3L1','CisE3L2',
            'CisE5L1','CisE5L2','NistCsf','Nist80053',
            'Iso27001','Stig','PciDss','Cmmc','Hipaa','CisaScuba'
          )
          $actualCols = $fm[0].PSObject.Properties.Name
          $missing = $expectedCols | Where-Object { $_ -notin $actualCols }
          if ($missing) {
            Write-Host "::error::framework-mappings.csv missing columns: $($missing -join ', ')"
            exit 1
          }
          Write-Host "  framework-mappings.csv: $($fm.Count) rows, $($actualCols.Count) columns OK"

          # --- check-id-mapping.csv ---
          $cid = Import-Csv data/check-id-mapping.csv
          if ($cid.Count -eq 0) {
            Write-Host "::error::check-id-mapping.csv is empty"
            exit 1
          }
          $cidExpected = @('CisControl','CheckId','Collector','Area','Name','SupersededBy')
          $cidActual = $cid[0].PSObject.Properties.Name
          $cidMissing = $cidExpected | Where-Object { $_ -notin $cidActual }
          if ($cidMissing) {
            Write-Host "::error::check-id-mapping.csv missing columns: $($cidMissing -join ', ')"
            exit 1
          }
          Write-Host "  check-id-mapping.csv: $($cid.Count) rows, $($cidActual.Count) columns OK"

      - name: Validate JSON files
        shell: pwsh
        run: |
          $failed = @()
          Get-ChildItem data/*.json -Recurse | ForEach-Object {
            try {
              $null = Get-Content $_.FullName -Raw | ConvertFrom-Json -ErrorAction Stop
              Write-Host "  OK: $($_.FullName -replace '.*data/', 'data/')"
            } catch {
              $failed += $_.Name
              Write-Host "::error file=$($_.FullName)::Invalid JSON: $($_.Exception.Message)"
            }
          }
          if ($failed) { exit 1 }

      - name: Validate registry.json schema (basic)
        shell: pwsh
        run: |
          $reg = Get-Content data/registry.json -Raw | ConvertFrom-Json
          $errors = @()

          if (-not $reg.schemaVersion) { $errors += "Missing 'schemaVersion' field" }
          if (-not $reg.dataVersion) { $errors += "Missing 'dataVersion' field" }
          if (-not $reg.checks) { $errors += "Missing 'checks' array" }
          if ($reg.checks.Count -eq 0) { $errors += "'checks' array is empty" }

          foreach ($check in $reg.checks) {
            if (-not $check.checkId) {
              $errors += "Check missing 'checkId'"
              break
            }
            if (-not $check.name) {
              $errors += "Check '$($check.checkId)' missing 'name'"
              break
            }
            if (-not $check.frameworks) {
              $errors += "Check '$($check.checkId)' missing 'frameworks'"
              break
            }
          }

          if ($errors) {
            $errors | ForEach-Object { Write-Host "::error::$_" }
            exit 1
          }
          Write-Host "  registry.json: $($reg.checks.Count) checks, schema valid"

      - name: Validate registry against JSON Schema
        run: |
          pip install jsonschema
          python -c "
          import json, jsonschema
          schema = json.load(open('data/registry.schema.json'))
          registry = json.load(open('data/registry.json'))
          jsonschema.validate(registry, schema)
          print(f'Registry validates against schema ({len(registry[\"checks\"])} checks)')
          "

  registry-consistency:
    name: Registry Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild and compare
        shell: pwsh
        run: |
          $tempOut = Join-Path $env:RUNNER_TEMP 'registry-rebuilt.json'
          & scripts/Build-Registry.ps1 -OutputPath $tempOut

          $committed = Get-Content data/registry.json -Raw | ConvertFrom-Json
          $rebuilt = Get-Content $tempOut -Raw | ConvertFrom-Json

          $committedCount = $committed.checks.Count
          $rebuiltCount = $rebuilt.checks.Count

          Write-Host "Committed registry: $committedCount checks"
          Write-Host "Rebuilt registry:   $rebuiltCount checks"

          if ($committedCount -ne $rebuiltCount) {
            $delta = $committedCount - $rebuiltCount
            Write-Host "::error::Registry mismatch: $committedCount committed vs $rebuiltCount rebuilt ($delta checks differ)"
            Write-Host "Run scripts/Build-Registry.ps1 to regenerate data/registry.json"
            exit 1
          } else {
            Write-Host "Registry is consistent with CSVs"
          }

  data-quality:
    name: Data Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Test-RegistryData
        shell: pwsh
        run: ./scripts/Test-RegistryData.ps1

  test:
    name: Pester Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester
        shell: pwsh
        run: |
          Install-Module Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $false
          $config.Run.Throw = $false
          $config.Run.PassThru = $true
          $result = Invoke-Pester -Configuration $config

          # Summary
          Write-Host "`nResults: $($result.PassedCount) passed, $($result.FailedCount) failed, $($result.SkippedCount) skipped"

          if ($result.FailedCount -gt 0) {
            Write-Host "::error::$($result.FailedCount) test(s) failed"
            exit 1
          }

  module-test:
    name: Module Import Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path ./CheckID.psd1
          Write-Host "Module: $($manifest.Name) v$($manifest.Version)"
          Write-Host "Exported functions: $($manifest.ExportedFunctions.Keys -join ', ')"
          if ($manifest.ExportedFunctions.Count -ne 4) {
            Write-Host "::error::Expected 4 exported functions, got $($manifest.ExportedFunctions.Count)"
            exit 1
          }

      - name: Test module import and basic operations
        shell: pwsh
        run: |
          Import-Module ./CheckID.psd1 -Force
          $checks = Get-CheckRegistry
          Write-Host "Loaded $($checks.Count) checks"
          if ($checks.Count -lt 233) {
            Write-Host "::error::Expected at least 233 checks"
            exit 1
          }
          $check = Get-CheckById 'ENTRA-ADMIN-001'
          if (-not $check) {
            Write-Host "::error::Get-CheckById failed for ENTRA-ADMIN-001"
            exit 1
          }
          Write-Host "Module import and basic operations OK"

  python-validate:
    name: Validate Python Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax-check Python scripts
        run: |
          python -m py_compile scripts/Build-DerivedMappings.py
          python -m py_compile scripts/Build-FrameworkTitles.py
          echo "All Python scripts compile clean"

      - name: Validate committed JSON outputs
        run: |
          python -c "import json; json.load(open('data/derived-mappings.json'))"
          echo "  OK: data/derived-mappings.json"
          python -c "import json; json.load(open('data/framework-titles.json'))"
          echo "  OK: data/framework-titles.json"

  publish:
    name: Publish to PSGallery
    runs-on: ubuntu-latest
    needs: [lint, validate-data, registry-consistency, data-quality, test, module-test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches manifest version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}' -replace '^v', ''
          $manifest = Test-ModuleManifest -Path ./CheckID.psd1
          if ($manifest.Version.ToString() -ne $tag) {
            Write-Host "::error::Tag version ($tag) does not match manifest version ($($manifest.Version))"
            exit 1
          }
          Write-Host "Tag v$tag matches manifest version"

      - name: Publish module
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:NUGET_API_KEY) {
            Write-Host "::error::PSGALLERY_API_KEY secret not set"
            exit 1
          }
          Publish-Module -Path . -NuGetApiKey $env:NUGET_API_KEY -Verbose
