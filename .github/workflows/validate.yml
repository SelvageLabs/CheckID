name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint PowerShell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse-check all scripts
        shell: pwsh
        run: |
          $allClean = $true
          Get-ChildItem scripts/*.ps1 | ForEach-Object {
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$null, [ref]$parseErrors
            )
            if ($parseErrors) {
              $allClean = $false
              Write-Host "::error file=$($_.Name)::$($parseErrors.Count) parse error(s)"
              $parseErrors | ForEach-Object { Write-Host "  $_" }
            } else {
              Write-Host "  OK: $($_.Name)"
            }
          }
          if (-not $allClean) { exit 1 }
          Write-Host "`nAll scripts parse clean"

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -RequiredVersion 1.24.0 -Force -Scope CurrentUser
          $results = Get-ChildItem scripts/*.ps1 |
            ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName }
          if ($results) {
            Write-Host "::warning::$($results.Count) PSScriptAnalyzer finding(s)"
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
          } else {
            Write-Host "No PSScriptAnalyzer findings"
          }
          # Warn only — do not fail on style issues

  validate-data:
    name: Validate Data Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate scf-check-mapping.json
        shell: pwsh
        run: |
          $mapping = Get-Content data/scf-check-mapping.json -Raw | ConvertFrom-Json
          if (-not $mapping.checks -or $mapping.checks.Count -eq 0) {
            Write-Host "::error::scf-check-mapping.json has no checks"
            exit 1
          }
          $noScf = @($mapping.checks | Where-Object { -not $_.scfPrimary })
          if ($noScf.Count -gt 0) {
            Write-Host "::error::$($noScf.Count) checks missing scfPrimary"
            exit 1
          }
          Write-Host "  scf-check-mapping.json: $($mapping.checks.Count) checks, all have scfPrimary"

      - name: Validate scf-framework-map.json
        shell: pwsh
        run: |
          $fwMap = Get-Content data/scf-framework-map.json -Raw | ConvertFrom-Json
          $fwCount = $fwMap.frameworks.PSObject.Properties.Count
          if ($fwCount -lt 10) {
            Write-Host "::error::scf-framework-map.json has only $fwCount frameworks (expected 12+)"
            exit 1
          }
          Write-Host "  scf-framework-map.json: $fwCount SCF-backed frameworks configured"

      - name: Validate JSON files
        shell: pwsh
        run: |
          $failed = @()
          Get-ChildItem data/*.json -Recurse | ForEach-Object {
            try {
              $null = Get-Content $_.FullName -Raw | ConvertFrom-Json -ErrorAction Stop
              Write-Host "  OK: $($_.FullName -replace '.*data/', 'data/')"
            } catch {
              $failed += $_.Name
              Write-Host "::error file=$($_.FullName)::Invalid JSON: $($_.Exception.Message)"
            }
          }
          if ($failed) { exit 1 }

      - name: Validate registry.json schema (basic)
        shell: pwsh
        run: |
          $reg = Get-Content data/registry.json -Raw | ConvertFrom-Json
          $errors = @()

          if ($reg.schemaVersion -ne '2.0.0') { $errors += "Expected schemaVersion 2.0.0, got '$($reg.schemaVersion)'" }
          if (-not $reg.dataVersion) { $errors += "Missing 'dataVersion' field" }
          if (-not $reg.checks) { $errors += "Missing 'checks' array" }
          if ($reg.checks.Count -lt 160) { $errors += "Expected at least 160 checks, got $($reg.checks.Count)" }

          foreach ($check in $reg.checks) {
            if (-not $check.checkId) {
              $errors += "Check missing 'checkId'"
              break
            }
            if (-not $check.scf) {
              $errors += "Check '$($check.checkId)' missing 'scf' object"
              break
            }
            if (-not $check.scf.primaryControlId) {
              $errors += "Check '$($check.checkId)' missing 'scf.primaryControlId'"
              break
            }
            if (-not $check.frameworks) {
              $errors += "Check '$($check.checkId)' missing 'frameworks'"
              break
            }
          }

          if ($errors) {
            $errors | ForEach-Object { Write-Host "::error::$_" }
            exit 1
          }
          Write-Host "  registry.json: $($reg.checks.Count) checks, schema v2.0.0 valid"

      - name: Validate registry against JSON Schema
        run: |
          pip install jsonschema
          python -c "
          import json, jsonschema
          schema = json.load(open('data/registry.schema.json'))
          registry = json.load(open('data/registry.json'))
          jsonschema.validate(registry, schema)
          print(f'Registry validates against schema ({len(registry[\"checks\"])} checks)')
          "

  data-quality:
    name: Data Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Test-RegistryData
        shell: pwsh
        run: ./scripts/Test-RegistryData.ps1

  test:
    name: Pester Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester
        shell: pwsh
        run: |
          Install-Module Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $false
          $config.Run.Throw = $false
          $config.Run.PassThru = $true
          $result = Invoke-Pester -Configuration $config

          Write-Host "`nResults: $($result.PassedCount) passed, $($result.FailedCount) failed, $($result.SkippedCount) skipped"

          if ($result.FailedCount -gt 0) {
            Write-Host "::error::$($result.FailedCount) test(s) failed"
            exit 1
          }

  module-test:
    name: Module Import Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path ./CheckID.psd1
          Write-Host "Module: $($manifest.Name) v$($manifest.Version)"
          Write-Host "Exported functions: $($manifest.ExportedFunctions.Keys -join ', ')"
          if ($manifest.ExportedFunctions.Count -ne 9) {
            Write-Host "::error::Expected 9 exported functions, got $($manifest.ExportedFunctions.Count)"
            exit 1
          }

      - name: Test module import and basic operations
        shell: pwsh
        run: |
          Import-Module ./CheckID.psd1 -Force
          $checks = Get-CheckRegistry
          Write-Host "Loaded $($checks.Count) checks"
          if ($checks.Count -lt 160) {
            Write-Host "::error::Expected at least 160 checks"
            exit 1
          }
          $check = Get-CheckById 'ENTRA-ADMIN-001'
          if (-not $check) {
            Write-Host "::error::Get-CheckById failed for ENTRA-ADMIN-001"
            exit 1
          }
          $scf = Get-ScfControl 'ENTRA-ADMIN-001'
          if (-not $scf -or -not $scf.primaryControlId) {
            Write-Host "::error::Get-ScfControl failed for ENTRA-ADMIN-001"
            exit 1
          }
          $byScf = Search-CheckByScf -ScfId $scf.primaryControlId
          if ($byScf.Count -eq 0) {
            Write-Host "::error::Search-CheckByScf returned no results"
            exit 1
          }
          Write-Host "Module import and SCF operations OK"

  python-validate:
    name: Validate Python Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax-check Python scripts
        run: |
          python -m py_compile scripts/Build-Registry.py
          python -m py_compile scripts/Build-ScfMigration.py
          python -m py_compile scripts/Build-FrameworkTitles.py
          echo "All Python scripts compile clean"

      - name: Validate committed JSON outputs
        run: |
          python -c "import json; json.load(open('data/scf-check-mapping.json'))"
          echo "  OK: data/scf-check-mapping.json"
          python -c "import json; json.load(open('data/scf-framework-map.json'))"
          echo "  OK: data/scf-framework-map.json"
          python -c "import json; json.load(open('data/framework-titles.json'))"
          echo "  OK: data/framework-titles.json"
